          cp ajeeb-lang/std/*.ajb release/packages/ajeeb-std/

      - name: Bootstrap check
        run: |
          release/ajeebc-linux-x86_64 ajeebc/tests/test_simple.ajb ajeebc/build/test_simple_check.ll --emit-llvm-only
          llc -O2 ajeebc/build/test_simple_check.ll -o ajeebc/build/test_simple_check.s
          gcc -no-pie ajeebc/build/test_simple_check.s ajeebc/runtime/ajeeb_runtime.c \
            -o ajeebc/build/test_simple_check -lm -ldl -Wno-int-to-pointer-cast
          OUTPUT=$(./ajeebc/build/test_simple_check 2>/dev/null)
          if [ "$OUTPUT" != "Hello World" ]; then
            echo "FAIL: expected 'Hello World', got '$OUTPUT'"
            exit 1
          fi
          echo "✓ Bootstrap check passed"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ajeeb-linux-x86_64
          path: release/

  build-macos-arm64:
    needs: generate-ir
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: brew install llvm

      - name: Download LLVM IR
        uses: actions/download-artifact@v4
        with:
          name: llvm-ir

      - name: Compile ajeebc (llc + cc)
        run: |
          export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
          mkdir -p release
          llc -O2 ajeebc/build/compiler.ll -o ajeebc/build/compiler.s
          cc ajeebc/build/compiler.s ajeebc/runtime/ajeeb_runtime.c \
            -o release/ajeebc-macos-arm64 -lm -Wno-int-to-pointer-cast
          chmod +x release/ajeebc-macos-arm64
          echo "✓ ajeebc-macos-arm64 built"

      - name: Compile parthi (llc + cc)
        run: |
          export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
          llc -O2 parthi/build/parthi.ll -o parthi/build/parthi.s
          cc parthi/build/parthi.s ajeebc/runtime/ajeeb_runtime.c \
            -o release/parthi-macos-arm64 -lm -Wno-int-to-pointer-cast
          chmod +x release/parthi-macos-arm64
          echo "✓ parthi-macos-arm64 built"

      - name: Compile parth (llc + cc)
        run: |
          export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
          llc -O2 parth/build/output.ll -o parth/build/output.s
          cc parth/build/output.s ajeebc/runtime/ajeeb_runtime.c \
            -o release/parth-macos-arm64 -lm -Wno-int-to-pointer-cast
          chmod +x release/parth-macos-arm64
