name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Step 1: Gen0 (aarch64) compiles all .ajb → LLVM IR ──────────
  generate-ir:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-dev

      - name: Generate LLVM IR (Gen0 aarch64 → platform-independent IR)
        run: |
          GEN0="ajeebc/bootstrap/ajeebc-linux-aarch64"
          chmod +x "$GEN0"

          # Place Gen0 where build scripts expect it
          mkdir -p ajeebc/build
          cp "$GEN0" ajeebc/build/ajeebc
          chmod +x ajeebc/build/ajeebc

          echo "=== Compile compiler.ajb → LLVM IR ==="
          "$GEN0" ajeebc/compiler/compiler.ajb ajeebc/build/compiler.ll --emit-llvm-only

          echo "=== Compile parthi (modular) → LLVM IR ==="
          bash parthi/build.sh --emit-llvm-only

          echo "=== Compile parth → LLVM IR ==="
          mkdir -p parth/build
          "$GEN0" parth/parth_m1.ajb parth/build/output.ll --emit-llvm-only

          echo "=== Compile test_simple → LLVM IR ==="
          "$GEN0" ajeebc/tests/test_simple.ajb ajeebc/build/test_simple.ll --emit-llvm-only

          echo "✓ All LLVM IR generated"
          ls -lh ajeebc/build/*.ll parthi/build/*.ll parth/build/*.ll

      - name: Upload LLVM IR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llvm-ir
          path: |
            ajeebc/build/compiler.ll
            ajeebc/build/test_simple.ll
            parthi/build/parthi.ll
            parth/build/output.ll
            ajeebc/runtime/ajeeb_runtime.c
            ajeeb-lang/std/

  # ── Step 2: Per-platform jobs — llc + gcc → native binary ───────
  build-linux-aarch64:
    needs: generate-ir
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM + GCC
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-dev gcc libc-dev

      - name: Download LLVM IR
        uses: actions/download-artifact@v4
        with:
          name: llvm-ir

      - name: Compile ajeebc (llc + gcc)
        run: |
          mkdir -p release
          llc -O2 ajeebc/build/compiler.ll -o ajeebc/build/compiler.s
          gcc -no-pie ajeebc/build/compiler.s ajeebc/runtime/ajeeb_runtime.c \
            -o release/ajeebc-linux-aarch64 -lm -ldl -Wno-int-to-pointer-cast
          chmod +x release/ajeebc-linux-aarch64
          echo "✓ ajeebc-linux-aarch64 built"

      - name: Compile parthi (llc + gcc)
        run: |
          llc -O2 parthi/build/parthi.ll -o parthi/build/parthi.s
          gcc -no-pie parthi/build/parthi.s ajeebc/runtime/ajeeb_runtime.c \
            -o release/parthi-linux-aarch64 -lm -ldl -Wno-int-to-pointer-cast
          chmod +x release/parthi-linux-aarch64
          echo "✓ parthi-linux-aarch64 built"

      - name: Compile parth (llc + gcc)
        run: |
          llc -O2 parth/build/output.ll -o parth/build/output.s
          gcc -no-pie parth/build/output.s ajeebc/runtime/ajeeb_runtime.c \
            -o release/parth-linux-aarch64 -lm -ldl -Wno-int-to-pointer-cast
          chmod +x release/parth-linux-aarch64
          echo "✓ parth-linux-aarch64 built"

      - name: Copy runtime + stdlib
        run: |
          cp ajeebc/runtime/ajeeb_runtime.c release/
          mkdir -p release/packages/ajeeb-std
          cp ajeeb-lang/std/*.ajb release/packages/ajeeb-std/

      - name: Bootstrap check
        run: |
          release/ajeebc-linux-aarch64 ajeebc/tests/test_simple.ajb ajeebc/build/test_simple_check.ll --emit-llvm-only
          llc -O2 ajeebc/build/test_simple_check.ll -o ajeebc/build/test_simple_check.s
          gcc -no-pie ajeebc/build/test_simple_check.s ajeebc/runtime/ajeeb_runtime.c \
            -o ajeebc/build/test_simple_check -lm -ldl -Wno-int-to-pointer-cast
          OUTPUT=$(./ajeebc/build/test_simple_check 2>/dev/null)
          if [ "$OUTPUT" != "Hello World" ]; then
            echo "FAIL: expected 'Hello World', got '$OUTPUT'"
            exit 1
          fi
          echo "✓ Bootstrap check passed"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ajeeb-linux-aarch64
          path: release/

  build-linux-x86_64:
