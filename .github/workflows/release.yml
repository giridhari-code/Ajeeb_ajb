          path: release/

  build-macos-x86_64:
    needs: generate-ir
    runs-on: macos-13
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: brew install llvm

      - name: Download LLVM IR
        uses: actions/download-artifact@v4
        with:
          name: llvm-ir

      - name: Compile ajeebc (llc + cc)
        run: |
          export PATH="/usr/local/opt/llvm/bin:$PATH"
          mkdir -p release
          llc -O2 ajeebc/build/compiler.ll -o ajeebc/build/compiler.s
          cc ajeebc/build/compiler.s ajeebc/runtime/ajeeb_runtime.c \
            -o release/ajeebc-macos-x86_64 -lm -Wno-int-to-pointer-cast
