          llc -O2 parth/build/output.ll -o parth/build/output.s
          cc parth/build/output.s ajeebc/runtime/ajeeb_runtime.c \
            -o release/parth-macos-x86_64 -lm -Wno-int-to-pointer-cast
          chmod +x release/parth-macos-x86_64
          echo "✓ parth-macos-x86_64 built"

      - name: Copy runtime + stdlib
        run: |
          cp ajeebc/runtime/ajeeb_runtime.c release/
          mkdir -p release/packages/ajeeb-std
          cp ajeeb-lang/std/*.ajb release/packages/ajeeb-std/

      - name: Bootstrap check
        run: |
          export PATH="/usr/local/opt/llvm/bin:$PATH"
          release/ajeebc-macos-x86_64 ajeebc/tests/test_simple.ajb ajeebc/build/test_simple_check.ll --emit-llvm-only
          llc -O2 ajeebc/build/test_simple_check.ll -o ajeebc/build/test_simple_check.s
          cc ajeebc/build/test_simple_check.s ajeebc/runtime/ajeeb_runtime.c \
            -o ajeebc/build/test_simple_check -lm -Wno-int-to-pointer-cast
          OUTPUT=$(./ajeebc/build/test_simple_check 2>/dev/null)
          if [ "$OUTPUT" != "Hello World" ]; then
            echo "FAIL: expected 'Hello World', got '$OUTPUT'"
            exit 1
          fi
          echo "✓ Bootstrap check passed"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ajeeb-macos-x86_64
          path: release/

  build-windows-x86_64:
    needs: generate-ir
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM + GCC
        run: |
          choco install llvm mingw -y
          echo "C:\Program Files\LLVM\bin" >> $GITHUB_PATH
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $GITHUB_PATH

      - name: Download LLVM IR
        uses: actions/download-artifact@v4
        with:
          name: llvm-ir

      - name: Compile ajeebc (llc + gcc)
        run: |
          mkdir -p release
          llc -O2 ajeebc/build/compiler.ll -o ajeebc/build/compiler.s
          gcc ajeebc/build/compiler.s ajeebc/runtime/ajeeb_runtime.c \
            -o release/ajeebc-windows-x86_64.exe -lm -Wno-int-to-pointer-cast
          echo "✓ ajeebc-windows-x86_64.exe built"

      - name: Compile parth (llc + gcc)
        run: |
          llc -O2 parth/build/output.ll -o parth/build/output.s
          gcc parth/build/output.s ajeebc/runtime/ajeeb_runtime.c \
