        run: |
          cp ajeebc/runtime/ajeeb_runtime.c release/
          mkdir -p release/packages/ajeeb-std
          cp ajeeb-lang/std/*.ajb release/packages/ajeeb-std/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ajeeb-windows-x86_64
          path: release/

  # ── Step 3: Create GitHub Release ────────────────────────────────
  create-release:
    needs: [build-linux-x86_64, build-linux-aarch64, build-macos-arm64, build-macos-x86_64, build-windows-x86_64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Merge artifacts into release
        run: |
          mkdir -p release/packages/ajeeb-std
          for dir in all-artifacts/*/; do
            cp "$dir"ajeebc-* release/ 2>/dev/null || true
            cp "$dir"parthi-* release/ 2>/dev/null || true
            cp "$dir"parth-* release/ 2>/dev/null || true
            cp "$dir"ajeeb_runtime.c release/ 2>/dev/null || true
            cp -n "$dir"packages/ajeeb-std/* release/packages/ajeeb-std/ 2>/dev/null || true
          done
          chmod +x release/ajeebc-* release/parthi-* release/parth-* 2>/dev/null || true
          # Generate SHA256SUMS.txt
          cd release && sha256sum ajeebc-* parthi-* parth-* 2>/dev/null > SHA256SUMS.txt || true
          echo "v${GITHUB_REF#refs/tags/}" > version.txt
          echo "=== SHA256SUMS.txt ==="
          cat SHA256SUMS.txt
          echo ""
          echo "=== Release contents ==="
          ls -lh release/

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Ajeeb ${{ steps.tag.outputs.tag }}
          body: |
            ## Ajeeb ${{ steps.tag.outputs.tag }}

            ### Install karo:
            **Linux / macOS:**
            ```bash
            curl -sSf https://raw.githubusercontent.com/giridhari-code/Ajeeb_ajb/main/scripts/install.sh | bash
            ```
            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/giridhari-code/Ajeeb_ajb/main/scripts/install.ps1 | iex
            ```

            ### Zaroorat hai:
            - `gcc` ya `clang`
            - `llc` (LLVM)

            ### Platforms:
            | Platform | Binary |
            |----------|--------|
            | Linux x86_64 | `ajeebc-linux-x86_64` |
            | Linux aarch64 | `ajeebc-linux-aarch64` |
            | macOS ARM64 (M1/M2) | `ajeebc-macos-arm64` |
            | macOS x86_64 | `ajeebc-macos-x86_64` |
            | Windows x86_64 | `ajeebc-windows-x86_64.exe` |

            ### Components:
            - **ajeebc** — Ajeeb compiler (built with self-hosted compiler)
            - **parthi** — MIR interpreter
            - **parth** — Project manager CLI
            - **ajeeb_runtime.c** — Runtime library
            - **ajeeb-std/** — Standard library

            ### SHA256 checksums:
            See `SHA256SUMS.txt` for binary checksums.
          files: |
            release/ajeebc-linux-x86_64
            release/ajeebc-linux-aarch64
            release/ajeebc-macos-arm64
            release/ajeebc-macos-x86_64
            release/ajeebc-windows-x86_64.exe
            release/parthi-linux-x86_64
            release/parthi-linux-aarch64
            release/parthi-macos-arm64
            release/parthi-macos-x86_64
            release/parth-linux-x86_64
            release/parth-linux-aarch64
            release/parth-macos-arm64
            release/parth-macos-x86_64
            release/parth-windows-x86_64.exe
            release/ajeeb_runtime.c
            release/packages/ajeeb-std/*
            release/SHA256SUMS.txt
            release/version.txt
